<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WFH Burnout Assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="background-orb orb-one"></div>
  <div class="background-orb orb-two"></div>

  <main class="auth-shell">
    <section class="glass-card split-card">
      <div class="card-pane welcome-pane">
        <h1>WFH Burnout Assessment</h1>
        <p>Support your energy, focus, and calm with a thoughtful check-in designed to help you reflect on your work rhythm.</p>
        <p class="privacy-note">Your wellbeing matters. Your entries remain private and are used only to guide your personal assessment.</p>
      </div>

      <div class="card-pane form-pane">
        <h2>Welcome back</h2>
        <form id="loginForm" class="auth-form">
          <label>
            Username
            <input type="text" name="username" placeholder="Enter your username" required />
          </label>
          <label>
            Password
            <input type="password" name="password" placeholder="Enter your password" required />
          </label>
          <button type="submit">Sign In</button>
          <p class="switch-link">New here? <a href="/register_page">Create an account</a></p>
        </form>
        <p id="message" class="form-message"></p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(form);

      try {
        const response = await fetch('/login', {
          method: 'POST',
          body: formData
        });
        const result = await response.json();

        if (result.status === 'success') {
          localStorage.setItem('access_token', result.access_token);
          message.textContent = 'Signed in successfully. Redirecting…';
          message.className = 'form-message success';
          window.location.href = '/dashboard';
        } else {
          message.textContent = result.message || 'Unable to sign in.';
          message.className = 'form-message error';
        }
      } catch (error) {
        message.textContent = 'A network issue occurred.';
        message.className = 'form-message error';
      }
    });
  </script>
</body>
</html>
